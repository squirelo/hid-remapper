CONFIG_LOG=y
CONFIG_LOG_MAX_LEVEL=3
CONFIG_LOG_BUFFER_SIZE=4096

CONFIG_USE_DT_CODE_PARTITION=y
CONFIG_KERNEL_BIN_NAME="ble_hid_peripheral"
CONFIG_BUILD_OUTPUT_UF2=y

CONFIG_CPLUSPLUS=y
CONFIG_STD_CPP17=y
CONFIG_NEWLIB_LIBC=y
CONFIG_LIB_CPLUSPLUS=y

CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y

CONFIG_GPIO=y

# BLE: peripheral only
CONFIG_BT=y
CONFIG_BT_DEBUG_LOG=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_SMP=y
# Disable privacy so device stays connectable after peer forgets pairing
# With privacy + bonds, peripheral uses whitelist and only accepts bonded peers
CONFIG_BT_PRIVACY=n
CONFIG_BT_SETTINGS=y
CONFIG_BT_MAX_CONN=2
CONFIG_BT_MAX_PAIRED=4
CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_BT_DEVICE_NAME="PlayAbility Receiver"
CONFIG_BT_GATT_SERVICE_CHANGED=y

# USB HID
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_HID=y
CONFIG_USB_HID_DEVICE_COUNT=1
CONFIG_USB_HID_POLL_INTERVAL_MS=1
CONFIG_USB_NRFX_EVT_QUEUE_SIZE=64
CONFIG_USB_DEVICE_VID=0xCAFE
# Unique PID so OS doesn't show cached "HID Remapper" name from 0xBAF2
CONFIG_USB_DEVICE_PID=0xBAF3
CONFIG_USB_DEVICE_MANUFACTURER="nRF52840"
CONFIG_USB_DEVICE_PRODUCT="PlayAbility Receiver"
CONFIG_USB_SELF_POWERED=n
CONFIG_USB_DEVICE_SOF=y
CONFIG_HID_INTERRUPT_EP_MPS=64
